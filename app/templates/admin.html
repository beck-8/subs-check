<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subs Check 配置管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/monaco-editor@0.43.0/min/vs/editor/editor.main.css" rel="stylesheet">
    <link href="/static/admin.css" rel="stylesheet">
</head>
<body>
    <!-- 配置模态框 -->
    <div class="modal fade" id="configModal" tabindex="-1" aria-labelledby="configModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="configModalLabel">
                        <i class="bi bi-gear me-2"></i>配置管理
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
                </div>
                <div class="modal-body">
                    <div id="configFormContainer"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        <i class="bi bi-x-circle me-1"></i>关闭
                    </button>
                    <button id="reloadConfigForm" type="button" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-repeat me-1"></i>刷新
                    </button>
                    <button id="saveConfigForm" type="button" class="btn btn-success">
                        <i class="bi bi-save me-1"></i>保存配置
                    </button>
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="configFileInput" accept=".yaml,.yml,text/yaml" style="display:none" />

    <div class="container-fluid">
        <div class="row align-items-center mb-3">
            <div class="col-md-8 col-sm-12">
                <h1 class="mb-0"><i class="bi bi-speedometer2 me-2"></i>Subs Check 配置管理</h1>
            </div>
            <div class="col-md-4 col-sm-12 text-md-end">
                <span class="version-badge" id="versionInfo">版本: 加载中...</span>
            </div>
        </div>

        <!-- 项目信息 -->
        <div class="alert alert-info mb-3 d-flex justify-content-between align-items-center">
            <div>
                <i class="bi bi-github me-2"></i>项目地址:
                <a href="https://github.com/beck-8/subs-check" target="_blank" class="text-break">https://github.com/beck-8/subs-check</a>
            </div>
            <div class="d-none d-md-block">
                <small>订阅检测工具</small>
            </div>
        </div>

        <!-- API密钥输入表单 -->
        <div class="card api-key-form">
            <div class="card-body py-2">
                <div class="row align-items-center">
                    <div class="col-md-3 col-sm-12 mb-sm-2">
                        <label for="apiKey" class="form-label mb-0"><strong><i class="bi bi-key me-1"></i>API密钥:</strong></label>
                    </div>
                    <div class="col-md-7 col-sm-8">
                        <div class="input-group">
                            <input type="password" class="form-control" id="apiKey" placeholder="请输入API密钥">
                            <button class="btn btn-outline-secondary" type="button" id="toggleApiKey">
                                <i class="bi bi-eye-slash"></i>
                            </button>
                        </div>
                    </div>
                    <div class="col-md-2 col-sm-4 text-end mt-sm-2">
                        <button id="saveApiKey" class="btn btn-primary btn-sm">保存密钥</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 状态栏 -->
        <div class="status-bar">
            <div class="row align-items-center">
                <div class="col-md-5 col-sm-12 status-item">
                    <strong><i class="bi bi-file-earmark-code me-1"></i>配置文件:</strong>
                    <span class="config-path" title="{{.configPath}}">{{.configPath}}</span>
                </div>
                <div class="col-md-3 col-sm-6 status-item">
                    <strong><i class="bi bi-activity me-1"></i>状态:</strong>
                    <span id="statusContainer">
                        <span id="statusIcon" class="bi me-1"></span>
                        <span id="nextCheckTime">加载中...</span>
                    </span>
                </div>
                <div class="col-md-4 col-sm-6 status-item text-md-end">
                    <button id="forceClose" class="btn btn-danger btn-sm me-2">
                        <i class="bi bi-stop-circle me-1"></i>强制停止
                    </button>
                    <button id="exportConfig" class="btn btn-outline-success btn-sm me-2">
                        <i class="bi bi-download me-1"></i>导出
                    </button>
                    <button id="importConfig" class="btn btn-outline-primary btn-sm me-2">
                        <i class="bi bi-upload me-1"></i>导入
                    </button>
                    <button id="openConfigModal" class="btn btn-info btn-sm">
                        <i class="bi bi-gear me-1"></i>配置
                    </button>
                </div>
            </div>
        </div>
        <!-- 保存提示信息 -->
        <div id="alertBanner" class="alert alert-info d-none" role="alert" style="margin-bottom: 16px;"></div>

        <!-- 主要内容区域 -->
        <div class="row main-row">
            <!-- 左侧日志区域 -->
            <div class="col-lg-5 col-md-12">
                <div class="card">
                    <div class="card-header">
                        <div class="d-flex justify-content-between align-items-center">
                            <span><i class="bi bi-terminal me-1"></i>最近日志</span>
                            <button id="refreshLogs" class="btn btn-secondary btn-sm">
                                <i class="bi bi-arrow-repeat me-1"></i>刷新
                            </button>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <div id="logs" class="logs-container"></div>
                    </div>
                    <!-- 进度条区域 -->
                    <div id="progressSection" class="progress-section">
                        <!-- 阶段步骤指示器 -->
                        <div id="phaseSteps" class="phase-steps" style="display: none;">
                            <div id="phaseStep1" class="phase-step" data-phase="1">
                                <span class="phase-icon"><i class="bi bi-heart-pulse"></i></span>测活
                                <span class="phase-count" id="phaseCount1"></span>
                            </div>
                            <div id="phaseStep2" class="phase-step" data-phase="2">
                                <span class="phase-icon"><i class="bi bi-film"></i></span>流媒体+重命名
                                <span class="phase-count" id="phaseCount2"></span>
                            </div>
                            <div id="phaseStep3" class="phase-step" data-phase="3">
                                <span class="phase-icon"><i class="bi bi-speedometer"></i></span>测速
                                <span class="phase-count" id="phaseCount3"></span>
                            </div>
                        </div>
                        <div class="progress-info">
                            <div>处理进度: <span id="progressText">N/A</span></div>
                            <div><span id="progressPercent">N/A</span></div>
                        </div>
                        <div class="progress-info">
                            <div id="successLabel">成功节点: <span id="successText">N/A</span></div>
                            <div><span id="processPercent">N/A</span></div>
                        </div>
                        <div class="progress">
                            <div id="progressBarSuccess" class="progress-bar progress-bar-success" role="progressbar" style="width: 0%"></div>
                            <div id="progressBarTotal" class="progress-bar progress-bar-total" role="progressbar" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右侧配置编辑器 -->
            <div class="col-lg-7 col-md-12">
                <div class="card">
                    <div class="card-header">
                        <div class="d-flex justify-content-between align-items-center">
                            <span><i class="bi bi-gear me-1"></i>配置编辑器</span>
                            <div>
                                <button id="toggleConfig" class="btn btn-outline-secondary btn-sm me-2" title="显示/隐藏配置">
                                    <i class="bi bi-eye-slash"></i>
                                </button>
                                <button id="saveConfig" class="btn btn-success btn-sm">
                                    <i class="bi bi-save me-1"></i>保存
                                </button>
                                <button id="reloadConfig" class="btn btn-secondary btn-sm ms-2">
                                    <i class="bi bi-arrow-repeat me-1"></i>重载
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <div class="editor-wrapper">
                            <div id="editor"></div>
                            <div id="editorOverlay" class="editor-overlay">
                                <div class="editor-overlay-message">
                                    <i class="bi bi-eye-slash me-2"></i>配置已隐藏，点击查看
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Monaco Editor -->
    <script>var require = { paths: { 'vs': 'https://cdn.jsdelivr.net/npm/monaco-editor@0.43.0/min/vs' } };</script>
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.43.0/min/vs/loader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.43.0/min/vs/editor/editor.main.nls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.43.0/min/vs/editor/editor.main.js"></script>

    <script src="/static/config-fields.js"></script>
    <script src="/static/admin.js"></script>
    <!-- 主逻辑 -->
    

</body>
</html>
